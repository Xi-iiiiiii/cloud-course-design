apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-analysis
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  # ← 替换为教师提供的 SWR PySpark 镜像地址
  image: swr.cn-north-4.myhuaweicloud.com/cloud-course-2023112435/pyspark:3.4
  mainApplicationFile: local:///opt/spark/work/analysis.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
  executor:
    cores: 1
    instances: 2        # ← 可修改为 1 做性能对比
    memory: "1g"
