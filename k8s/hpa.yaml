apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

# 验证命令（分别在两个终端窗口运行）：
# 窗口1（监控）：kubectl get pods -w
# 窗口2（压测）：ab -n 10000 -c 200 http://<ELB_IP>/api/ping
