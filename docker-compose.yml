version: "3.9"
services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    environment:
      - BACKEND_HOST=backend
    depends_on:
      - backend
    restart: unless-stopped
    # 本地测试时使用本地 nginx 配置
    volumes:
      - ./app/frontend/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
