# =============================================================================
# 云计算课程设计 — 附加题2：CI/CD 流水线
# 触发：push main 分支 → 构建镜像 → 推送 SWR → 更新 K8s Deployment
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: cloud-course-2023112435

jobs:
  # ── Job 1: 构建并推送后端镜像 ───────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: cn-north-4@${{ secrets.SWR_AK }}
          password: ${{ secrets.SWR_SK }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile.backend
          push: true
          tags: ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/backend:v2

  # ── Job 2: 构建并推送前端镜像 ───────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: cn-north-4@${{ secrets.SWR_AK }}
          password: ${{ secrets.SWR_SK }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile.frontend
          push: true
          tags: ${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/frontend:v2

  # ── Job 3: 更新 K8s Deployment（持续部署）───────────────
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update Backend Image
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/backend:v2 \
            -n default

      - name: Update Frontend Image
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.SWR_REGISTRY }}/${{ env.SWR_ORG }}/frontend:v2 \
            -n default

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/backend -n default --timeout=120s
          kubectl rollout status deployment/frontend -n default --timeout=120s
          kubectl get pods -n default
